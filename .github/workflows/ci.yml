name: CI

on:
  push:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
      - '.golangci.yml'
  pull_request:
    branches: [main]
    paths:
      - '**.go'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/**'
      - '.golangci.yml'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: markdownlint
        run: npx markdownlint-cli '*.md' 'rfcs/*.md'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Soft Serve
        run: go install github.com/charmbracelet/soft-serve/cmd/soft@latest

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -coverpkg=./internal/...,./cmd/...,./pkg/... -coverprofile=unit.cov ./internal/... -timeout 120s

      - name: Integration tests
        run: go test -tags integration -coverpkg=./internal/...,./cmd/...,./pkg/... -coverprofile=integration.cov ./tests/integration/ -timeout 60s

      - name: E2E tests
        run: go test -tags integration -coverpkg=./internal/...,./cmd/...,./pkg/... -coverprofile=e2e.cov ./tests/e2e/ -timeout 90s

      - name: Merge coverage
        run: |
          head -1 unit.cov > combined.cov
          tail -n +2 unit.cov >> combined.cov
          tail -n +2 integration.cov >> combined.cov
          tail -n +2 e2e.cov >> combined.cov
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=combined.cov | grep 'total:' | awk '{print "**Combined coverage: " $NF "**"}' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=combined.cov | grep 'total:'

  test-embedding:
    name: Test (embedding)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Soft Serve
        run: go install github.com/charmbracelet/soft-serve/cmd/soft@latest

      - name: Download ONNX Runtime
        run: |
          curl -sSL https://github.com/microsoft/onnxruntime/releases/download/v1.22.0/onnxruntime-linux-x64-1.22.0.tgz \
            | tar xz
          mkdir -p $HOME/.kinoko/models/bge-small-en-v1.5
          cp onnxruntime-linux-x64-1.22.0/lib/libonnxruntime.so.1.22.0 $HOME/.kinoko/models/bge-small-en-v1.5/libonnxruntime.so

      - name: Download libtokenizers
        run: |
          curl -sSL -o libtokenizers.tar.gz \
            https://github.com/daulet/tokenizers/releases/download/v1.25.0/libtokenizers.linux-amd64.tar.gz
          tar xzf libtokenizers.tar.gz
          sudo cp libtokenizers.a /usr/local/lib/
          sudo ldconfig

      - name: Download BGE-small-en-v1.5 ONNX model
        run: |
          MODEL_DIR=$HOME/.kinoko/models/bge-small-en-v1.5
          # Pinned to commit 5c38ec7c405ec4b44b94cc5a9bb96e735b38267a (2024-02-22)
          curl -sSL -o $MODEL_DIR/model.onnx \
            "https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/5c38ec7c405ec4b44b94cc5a9bb96e735b38267a/onnx/model.onnx"
          curl -sSL -o $MODEL_DIR/tokenizer.json \
            "https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/5c38ec7c405ec4b44b94cc5a9bb96e735b38267a/tokenizer.json"

      - name: Verify native libs
        run: |
          echo "=== libtokenizers ==="
          ls -la /usr/local/lib/libtokenizers* || echo "NOT FOUND"
          nm /usr/local/lib/libtokenizers.a 2>/dev/null | grep tokenizers_version || echo "NO VERSION SYMBOL"
          echo "=== onnxruntime ==="
          ls -la ${{ github.workspace }}/onnxruntime-linux-x64-1.22.0/lib/ || echo "NOT FOUND"
          echo "=== CGO env ==="
          echo "CGO_LDFLAGS=$CGO_LDFLAGS"
          echo "CGO_ENABLED=$CGO_ENABLED"
          echo "LD_LIBRARY_PATH=$LD_LIBRARY_PATH"
          echo "=== ldconfig ==="
          ldconfig -p | grep -i "tokenizer\|onnx" || echo "not in ldconfig"
          echo "=== gcc search ==="
          gcc -print-search-dirs | head -3

      - name: Embedding tests
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/onnxruntime-linux-x64-1.22.0/lib
        run: |
          go test -v -tags embedding -coverpkg=./internal/...,./cmd/...,./pkg/... \
            -coverprofile=embedding.cov ./internal/embedding/... -timeout 120s

      - name: Embedding coverage
        run: |
          echo "## Embedding Coverage" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=embedding.cov | grep 'total:' | awk '{print "**Embedding coverage: " $NF "**"}' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=embedding.cov | grep 'total:'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o kinoko ./cmd/kinoko/

      - name: Verify binary
        run: ./kinoko --help

