name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: markdownlint
        run: npx markdownlint-cli '*.md' 'rfcs/*.md'

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Install Soft Serve
        run: go install github.com/charmbracelet/soft-serve/cmd/soft@latest

      - name: Unit tests
        run: go test -short -coverpkg=./internal/... -coverprofile=unit.cov ./internal/... -timeout 120s

      # -short: some tests hang due to Soft Serve subprocess shutdown issues.
      # Remove -short once serve shutdown is fixed (see internal-docs/bugs/serve-api-key-gate.md).
      - name: Integration tests
        run: go test -short -tags integration -coverpkg=./internal/... -coverprofile=integration.cov ./tests/integration/ -timeout 180s

      - name: E2E tests
        run: go test -short -tags integration -coverpkg=./internal/... -coverprofile=e2e.cov ./tests/e2e/ -timeout 180s

      - name: Merge coverage
        run: |
          head -1 unit.cov > combined.cov
          tail -n +2 unit.cov >> combined.cov
          tail -n +2 integration.cov >> combined.cov
          tail -n +2 e2e.cov >> combined.cov
          echo "## Coverage Report" >> $GITHUB_STEP_SUMMARY
          go tool cover -func=combined.cov | grep 'total:' | awk '{print "**Combined coverage: " $NF "**"}' >> $GITHUB_STEP_SUMMARY
          go tool cover -func=combined.cov | grep 'total:'

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o kinoko ./cmd/kinoko/

      - name: Verify binary
        run: ./kinoko --help
